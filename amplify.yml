version: 1
# Single build spec for BOTH Amplify apps in this monorepo.
# A repo-level amplify.yml takes precedence over the app-level build spec set
# in the console/CLI, so we branch on $AWS_APP_ID instead:
#   - ADMIN app  -> deploys the shared Gen 2 backend, builds the admin frontend
#   - PORTAL app -> reuses the admin backend (no deploy), builds portal frontend
env:
  variables:
    ADMIN_APP_ID: d11yajkly52yyj
backend:
  phases:
    build:
      commands:
        # npm install (not npm ci): Amplify's bundled deps (zod, @noble/hashes)
        # have internal version mismatches that npm ci rejects.
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - |
          if [ "$AWS_APP_ID" = "$ADMIN_APP_ID" ]; then
            echo "ADMIN app: deploying shared backend"
            npx ampx pipeline-deploy --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
          else
            echo "PORTAL app: reusing ADMIN backend ($ADMIN_APP_ID)"
            npx ampx generate outputs --branch main --app-id "$ADMIN_APP_ID"
          fi
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
    build:
      commands:
        - |
          if [ "$AWS_APP_ID" = "$ADMIN_APP_ID" ]; then APP=admin; else APP=portal; fi
          echo "Building frontend: $APP"
          cp amplify_outputs.json "$APP/src/amplify_outputs.json"
          npx nx build "$APP" --configuration=production
          rm -rf dist/current
          cp -r "dist/$APP" dist/current
  artifacts:
    baseDirectory: dist/current/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
