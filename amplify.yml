version: 1
# Build spec for the ADMIN Amplify app.
# This is the primary app: it deploys the shared Gen 2 backend
# (auth, data, storage) and builds the admin frontend.
# The portal app reuses this backend (see amplify.portal.yml).
backend:
  phases:
    build:
      commands:
        # npm install (not npm ci): Amplify's bundled deps (zod, @noble/hashes)
        # have internal version mismatches that npm ci rejects.
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline --no-audit --no-fund
    build:
      commands:
        - cp amplify_outputs.json admin/src/amplify_outputs.json
        - npx nx build admin --configuration=production
  artifacts:
    baseDirectory: dist/admin/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
