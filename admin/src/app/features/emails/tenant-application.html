<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Application - Protos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-2xl mx-auto my-8 p-8 bg-white rounded-lg shadow-xl">
        <h1 class="text-3xl font-bold text-center text-indigo-700 mb-6">Protos Rental Application</h1>
        <p class="text-center text-lg mb-8">Hello {{firstName}},</p>
        <p class="text-center mb-8">You've been invited to apply as a <strong>Tenant</strong>. Your temporary password is:</p>
        <p class="text-center text-2xl font-bold text-indigo-600 mb-8">{{temporaryPassword}}</p>
        <p class="text-center mb-10">Please complete the full application below to proceed.</p>

        <!-- Your full multi-step rental application form -->
        <!-- Phase 1: Quick Apply -->
        <div class="max-w-lg mx-auto p-6 bg-gray-50 rounded-lg mb-8">
            <h2 class="text-2xl font-bold text-center mb-6">Step 1: Basic Information</h2>
            <form id="quick-apply-form" class="space-y-4" onsubmit="saveProgress(event, 'quick-apply')">
                <!-- All your fields from the original -->
                <div><label class="block font-medium">Full Name</label><input type="text" name="full-name" required class="w-full border rounded px-3 py-2" /></div>
                <div><label class="block font-medium">Email</label><input type="email" name="email" required class="w-full border rounded px-3 py-2" value="{{email}}" readonly /></div>
                <div><label class="block font-medium">Phone</label><input type="tel" name="phone" required class="w-full border rounded px-3 py-2" /></div>
                <div><label class="block font-medium">Property Address / Unit</label><input type="text" name="property-address" required class="w-full border rounded px-3 py-2" /></div>
                <div><label class="block font-medium">Desired Move-in Date</label><input type="date" name="move-in-date" required class="w-full border rounded px-3 py-2" /></div>
                <div><label class="block font-medium">Lease Term</label>
                    <select name="lease-term" required class="w-full border rounded px-3 py-2">
                        <option>6 Months</option><option>12 Months</option><option>Flexible</option>
                    </select>
                </div>
                <div><label class="block font-medium">Number of Occupants</label><input type="number" name="occupants" min="1" required class="w-full border rounded px-3 py-2" /></div>
                <div><label class="block font-medium">Monthly Income Range</label>
                    <select name="income-range" required class="w-full border rounded px-3 py-2">
                        <option>$0 - $2,000</option><option>$2,001 - $4,000</option><option>$4,001 - $6,000</option><option>$6,001+</option>
                    </select>
                </div>
                <div><label class="block font-medium">Any Pets?</label>
                    <select name="pets" onchange="togglePetDetails(this)" class="w-full border rounded px-3 py-2">
                        <option>No</option><option>Yes</option>
                    </select>
                    <textarea name="pet-details" class="w-full border rounded px-3 py-2 mt-2 hidden" placeholder="Describe pets"></textarea>
                </div>
                <div><label class="block font-medium">Smoking?</label>
                    <select name="smoking" class="w-full border rounded px-3 py-2"><option>No</option><option>Yes</option></select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded hover:bg-indigo-700">Continue to Step 2</button>
            </form>
        </div>

        <!-- Phase 2 and 3 would go here (same as your original) -->
        <!-- For brevity, include the rest of your original form -->

        <script>
            function saveProgress(e, id) { e.preventDefault(); /* same as your script */ }
            function togglePetDetails(s) { 
                const t = document.querySelector('[name="pet-details"]'); 
                t.classList.toggle('hidden', s.value === 'No'); 
            }
        </script>
    </div>
</body>
</html>
