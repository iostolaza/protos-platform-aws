<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
  <h2 class="text-2xl font-bold mb-6">Invite New User</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="invite-firstName" class="block text-sm font-medium text-gray-700">First Name</label>
        <input id="invite-firstName" formControlName="firstName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required />
      </div>
      <div>
        <label for="invite-lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
        <input id="invite-lastName" formControlName="lastName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required />
      </div>
    </div>

    <div>
      <label for="invite-email" class="block text-sm font-medium text-gray-700">Email</label>
      <input id="invite-email" type="email" formControlName="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required />
    </div>

    <div>
      <label for="invite-role" class="block text-sm font-medium text-gray-700">Role</label>
      <select id="invite-role" formControlName="role" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        <option value="Tenant">Tenant</option>
        <option value="Manager">Manager</option>
        <option value="Facilities">Facilities Team</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <div>
      <label for="invite-applicationType" class="block text-sm font-medium text-gray-700">Application Type</label>
      <select id="invite-applicationType" formControlName="applicationType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
        <option value="Tenant">Rental Application (Tenant)</option>
        <option value="Employee">Employee Onboarding (All others)</option>
      </select>
    </div>

    <button type="submit" [disabled]="form.invalid || loading"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed">
      {{ loading ? 'Sending Invitation...' : 'Send Invitation' }}
    </button>
  </form>

  @if (errorMessage) {
    <div class="mt-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      {{ errorMessage }}
    </div>
  }

  @if (success) {
    <div
      class="mt-6 p-4 rounded-lg text-sm"
      [class.bg-green-100]="!successMessage"
      [class.border-green-400]="!successMessage"
      [class.text-green-700]="!successMessage"
      [class.bg-amber-50]="!!successMessage"
      [class.border-amber-200]="!!successMessage"
      [class.text-amber-900]="!!successMessage"
      [class.border]="true"
    >
      {{ successMessage || 'Invitation sent successfully!' }}
    </div>
  }
</div>
