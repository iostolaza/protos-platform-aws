
<!-- src/app/features/home/home.component.html -->

<!-- NEW: Uniform wrapper (removes pt-[5%]; dynamic width/height via utility) -->
<div class="page-wrapper">
  <!-- Top Greeting Card -->
  <app-home-overview></app-home-overview>

  <!-- Overview Cards — auto-flow grid (no hardcoded row/col positions) -->
  <div class="grid grid-cols-[repeat(3,minmax(150px,1fr))] gap-4 auto-rows-auto">
    <app-messages-overview *libIfFeature="'messaging'" class="rounded-lg aspect-square"></app-messages-overview>
    <app-contacts-overview *libIfFeature="'contacts'" class="rounded-lg"></app-contacts-overview>
    <app-tickets-overview *libIfFeature="'tickets'" class="rounded-lg row-span-2"></app-tickets-overview>
    <app-activity-overview class="rounded-lg col-span-2 aspect-[2/1]"></app-activity-overview>
    <app-documents-overview *libIfFeature="'documents'" class="rounded-lg aspect-square"></app-documents-overview>
    <app-financial-overview *libIfFeature="'financial.accounts'" class="rounded-lg aspect-square"></app-financial-overview>
    <app-profile-overview class="rounded-lg col-span-2"></app-profile-overview>
  </div>
</div>
