@for (menu of menuService.pagesMenu(); track menu.group) {
  @if (menuService.showSideBar) {
    <div class="mx-1 flex items-center justify-between py-3">
      <small [ngClass]="{ hidden: !menuService.showSideBar }" class="text-foreground text-xs font-semibold">
        {{ menu.group }}
      </small>
    </div>
  }
  <ul class="flex flex-col">
    @for (item of menu.items; track item.label) {
      @if (!item.adminOnly) {
        <li>
          <button
            type="button"
            (click)="toggleMenu(item)"
            class="nav-hover text-foreground group relative flex w-full grow items-center gap-4 rounded-lg px-2 py-2 text-left focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
          >
            <div [ngClass]="item.active ? 'text-primary' : ''">
              @if (item.icon) {
                <svg-icon [src]="getIconPath(item.icon)" svgClass="h-5 w-5"></svg-icon>
              }
            </div>
            <ng-container [ngTemplateOutlet]="item.children ? childMenu : parentMenu" [ngTemplateOutletContext]="{ item: item }"></ng-container>
            <ng-template #parentMenu let-item="item">
              @if (item.route === '/logout') {
                <span class="inline-flex h-[36px] w-full items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground">
                  {{ item.label }}
                </span>
              } @else {
                <a
                  [routerLink]="item.route"
                  routerLinkActive="text-primary"
                  class="inline-flex h-[36px] w-full items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground"
                >
                  {{ item.label }}
                </a>
              }
            </ng-template>
            <ng-template #childMenu let-item="item">
              <span class="inline-flex h-9 grow items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground">
                {{ item.label }}
              </span>
            </ng-template>
            @if (item.children) {
              <span class="flex cursor-pointer items-center justify-end p-0 transition-all duration-500">
                @if (!item.expanded) {
                  <svg-icon [src]="getIconPath('plus')" svgClass="h-4 w-4 text-success"></svg-icon>
                } @else {
                  <svg-icon [src]="getIconPath('minus')" svgClass="h-4 w-4 text-destructive"></svg-icon>
                }
              </span>
            }
           @if (!menuService.showSideBar) {
  <span
    role="tooltip"
    class="pointer-events-none absolute left-full top-1/2 z-50 ml-3
           -translate-y-1/2 -translate-x-1
           whitespace-nowrap rounded-lg
           bg-foreground text-background
           px-3 py-1.5 text-sm font-medium
           shadow-xl opacity-0
           transition-all duration-200
           group-hover:opacity-100 group-hover:translate-x-0"
  >
    {{ item.label }}
  </span>
}
          </button>
          <lib-sidebar-submenu [submenu]="item"></lib-sidebar-submenu>
        </li>
      }
    }
  </ul>
  @if (menu.separator) {
    <div class="py-3">
      <hr class="border-border border-dashed" />
    </div>
  }
}
