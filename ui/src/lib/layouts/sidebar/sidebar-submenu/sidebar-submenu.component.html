<div class="max-h-0 overflow-hidden pt-1 transition-all duration-500 ltr:pl-4 rtl:pr-4" [ngClass]="{ hidden: !menuService.showSideBar, 'max-h-screen': submenu.expanded }">
  <ul class="border-border text-foreground flex flex-col border-dashed ltr:border-l ltr:pl-2 rtl:border-r rtl:pr-2">
    @for (sub of submenu.children; track sub.label) {
      <li>
        <button
          type="button"
          (click)="toggleMenu(sub)"
          class="relative flex w-full nav-hover items-center gap-2 rounded-lg px-4 py-2 text-left text-xs focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
        >
          <ng-container [ngTemplateOutlet]="sub.children ? childMenu : parentMenu" [ngTemplateOutletContext]="{ sub: sub }"></ng-container>
          <ng-template #parentMenu let-item="item">
  <span
    class="flex min-w-0 flex-1 overflow-hidden whitespace-nowrap transition-all duration-300"
    [ngClass]="menuService.showSideBar ? 'max-w-[9999px] opacity-100' : 'max-w-0 opacity-0 pointer-events-none'"
  >
    @if (item.route === '/logout') {
      <span class="inline-flex h-[36px] w-full items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground">
        {{ item.label }}
      </span>
    } @else {
      <a
        [routerLink]="item.route"
        routerLinkActive="text-primary"
        class="inline-flex h-[36px] w-full items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground"
      >
        {{ item.label }}
      </a>
    }
  </span>
</ng-template>

<ng-template #childMenu let-item="item">
  <span
    class="flex min-w-0 flex-1 overflow-hidden whitespace-nowrap transition-all duration-300"
    [ngClass]="menuService.showSideBar ? 'max-w-[9999px] opacity-100' : 'max-w-0 opacity-0 pointer-events-none'"
  >
    <span class="inline-flex h-9 w-full items-center justify-start rounded-sm px-2 text-xs font-semibold text-foreground">
      {{ item.label }}
    </span>
  </span>
</ng-template>
        </button>
        @if (sub.children?.length) {
          <lib-sidebar-submenu [submenu]="sub"></lib-sidebar-submenu>
        }
      </li>
    }
  </ul>
</div>
