<nav
  [ngClass]="menuService.showSideBar ? 'w-[210px] xl:w-[280px]' : 'w-[70px]'"
  class="bg-card hidden h-full min-h-0 flex-col lg:flex"
>
  <div class="flex min-h-0 flex-1 flex-col">
    <div
      [ngClass]="menuService.showSideBar ? 'justify-between' : 'justify-center'"
      class="mx-4 mb-2 flex h-9 shrink-0 items-center"
    >
      @if (menuService.showSideBar) {
        <div class="flex items-center">
          <b class="text-heading ps-2 ml-1 grow text-sm">Navigation</b>
        </div>
      }
      <button
        (click)="toggleSidebar()"
        class="nav-hover text-foreground flex items-center justify-center rounded-md p-2 transition-all duration-200 focus:outline-none"
        [ngClass]="{ 'rotate-180': !menuService.showSideBar }"
      >
        <svg-icon src="assets/icons/heroicons/outline/arrow-left.svg" svgClass="h-5 w-5 text-foreground group-hover:text-muted-foreground"></svg-icon>
      </button>
    </div>

    <div class="scrollbar-thumb--sm scrollbar-track-rounded scrollbar-thin scrollbar-track-transparent scrollbar-thumb-muted min-h-0 flex-1 overflow-y-auto px-4">
      <lib-sidebar-menu [menuGroups]="mainMenuGroups()"></lib-sidebar-menu>
    </div>
  </div>

  <div class="border-border shrink-0 border-t px-4 py-2">
    <lib-sidebar-menu [menuGroups]="accountMenuGroups()"></lib-sidebar-menu>
  </div>
</nav>
